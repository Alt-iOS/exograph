name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  MIX_ENV: test

permissions:
  contents: read

jobs:
  ci:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      EXOGRAPH_DATABASE_URL: postgres://postgres:postgres@localhost:5432/postgres

    steps:
      - uses: actions/checkout@v4

      - uses: erlef/setup-beam@v1
        with:
          elixir-version: "1.20"
          otp-version: "29"

      - uses: actions/cache@v4
        with:
          path: |
            deps
            _build
          key: mix-29-1.20-${{ hashFiles('mix.lock') }}
          restore-keys: mix-29-1.20-

      - run: mix deps.get
      - run: npm --prefix ./assets ci
      - run: mix compile --warnings-as-errors
      - run: mix format --check-formatted
      - run: mix test --exclude duckdb --include postgres
      - run: mix credo --strict
      - run: mix ex_dna
